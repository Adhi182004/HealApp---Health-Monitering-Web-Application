<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fitness & Performance — HealApp</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{--brand:#00b894;--brand-dark:#009e7e;--brand-light:#e6f9f4;--brand-mid:#b2ede1;--brand-glow:rgba(0,184,148,0.13);--bg:#f2faf7;--surface:#ffffff;--surface2:#f7fdfb;--border:#d0ede5;--text:#0f2d25;--text-muted:#3d7a68;--text-dim:#8fbfb3;--warn:#f39c12;--warn-light:#fff8e6;--radius:16px;--radius-sm:10px;--shadow:0 2px 16px rgba(0,184,148,0.08);--shadow-md:0 6px 28px rgba(0,184,148,0.13);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Times New Roman',Times,serif;background:var(--bg);color:var(--text);min-height:100vh;}
.topbar{background:var(--brand);height:56px;display:flex;align-items:center;padding:0 28px;box-shadow:0 2px 12px rgba(0,184,148,0.3);position:sticky;top:0;z-index:200;}
.topbar-brand{color:#fff;font-size:1.2rem;font-weight:bold;font-style:italic;}
.topbar-back{margin-left:auto;color:rgba(255,255,255,0.85);font-size:0.82rem;font-weight:bold;text-decoration:none;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);padding:5px 14px;border-radius:20px;}
.hero{background:linear-gradient(135deg,var(--brand) 0%,#00c9a7 100%);padding:38px 24px 78px;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4z'/%3E%3C/g%3E%3C/svg%3E");}
.hero-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.35);color:#fff;border-radius:20px;padding:5px 14px;font-size:0.75rem;font-weight:bold;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;position:relative;}
.hero h1{font-size:clamp(1.6rem,4vw,2.2rem);font-weight:bold;font-style:italic;color:#fff;margin-bottom:8px;position:relative;}
.hero p{font-size:0.9rem;color:rgba(255,255,255,0.85);max-width:460px;margin:0 auto;line-height:1.65;position:relative;}
.page{max-width:860px;margin:0 auto;padding:0 24px 60px;}
.main-wrap{margin-top:-40px;position:relative;z-index:10;display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start;}
.panel{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:26px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.panel::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--brand),#00d4aa);}
.panel-title{font-size:0.78rem;font-weight:bold;text-transform:uppercase;letter-spacing:0.12em;color:var(--brand);margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.panel-title::after{content:'';flex:1;height:1px;background:var(--border);}
.field{margin-bottom:14px;}
.field label{display:block;font-size:0.85rem;font-weight:bold;color:var(--text);margin-bottom:5px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
input[type="number"]{width:100%;padding:11px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Times New Roman',Times,serif;font-size:0.95rem;color:var(--text);outline:none;transition:border-color 0.2s;appearance:none;}
input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-glow);background:#fff;}
input::placeholder{color:var(--text-dim);}
.optional-label{font-size:0.75rem;color:var(--text-dim);font-weight:normal;margin-left:4px;}
.btn-calc{width:100%;padding:13px;background:var(--brand);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'Times New Roman',serif;font-size:1rem;font-weight:bold;cursor:pointer;box-shadow:0 4px 16px rgba(0,184,148,0.3);margin-top:6px;transition:background 0.2s,transform 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-calc:hover{background:var(--brand-dark);transform:translateY(-1px);}
.btn-pdf{width:100%;padding:11px;background:var(--surface);color:var(--brand);border:1.5px solid var(--brand-mid);border-radius:var(--radius-sm);font-family:'Times New Roman',serif;font-size:0.92rem;font-weight:bold;cursor:pointer;margin-top:10px;transition:all 0.18s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-pdf:hover{background:var(--brand);color:#fff;border-color:var(--brand);}
.result-item{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);margin-bottom:9px;}
.result-item.highlight{background:var(--brand-light);border-color:var(--brand-mid);}
.ri-label{font-size:0.85rem;font-weight:bold;color:var(--text-muted);}
.ri-val{font-size:1rem;font-weight:bold;color:var(--brand);font-style:italic;}
.section-label{font-size:0.72rem;font-weight:bold;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-dim);margin:14px 0 8px;padding-left:4px;}
.zone-bar{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;}
.zone-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.zone-name{font-size:0.82rem;font-weight:bold;color:var(--text-muted);flex:1;}
.zone-bpm{font-size:0.9rem;font-weight:bold;color:var(--brand);}
.empty-result{text-align:center;padding:32px 0;color:var(--text-dim);font-style:italic;font-size:0.9rem;}
.empty-result span{display:block;font-size:2.5rem;margin-bottom:10px;}
@media(max-width:720px){.main-wrap{grid-template-columns:1fr;margin-top:-28px;}.page{padding:0 14px 48px;}.field-row{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-brand">WebHeal.</div>
  <a class="topbar-back" href="{{ url_for('body') }}">← Health Calculator Hub</a>
</div>
<div class="hero">
  <div class="hero-badge">🏃 Fitness & Performance</div>
  <h1>Fitness & Performance Calculator</h1>
  <p>VO₂ Max, Heart Rate Zones (5 zones), 1RM Strength (Epley), Running Pace and Calories Burned.</p>
</div>
<div class="page">
  <div class="main-wrap">
    <div class="panel">
      <div class="panel-title">📋 Enter Your Details</div>
      <div class="field-row">
        <div class="field"><label>Age</label><input type="number" id="age" placeholder="e.g. 28"></div>
        <div class="field"><label>Weight (kg)</label><input type="number" id="weight" placeholder="e.g. 70"></div>
      </div>
      <div class="field"><label>Running Distance (km) <span class="optional-label">optional</span></label><input type="number" id="distance" placeholder="e.g. 5" step="0.1"></div>
      <div class="field"><label>Time (minutes) <span class="optional-label">for distance above</span></label><input type="number" id="time" placeholder="e.g. 28"></div>
      <div class="field-row">
        <div class="field"><label>Reps <span class="optional-label">for 1RM</span></label><input type="number" id="reps" placeholder="e.g. 8"></div>
        <div class="field"><label>Lifted (kg)</label><input type="number" id="lift" placeholder="e.g. 80"></div>
      </div>
      <button class="btn-calc" onclick="calculate()">⚡ Calculate</button>
      <button class="btn-pdf" onclick="downloadPDF()">⬇ Download PDF Report</button>
    </div>
    <div class="panel">
      <div class="panel-title">📊 Results</div>
      <div id="result"><div class="empty-result"><span>🏃</span>Fill in your details and click Calculate</div></div>
    </div>
  </div>
</div>
<script>
let rd = {};

function getVO2Category(vo2) {
  if (vo2 > 55) return 'Superior';
  if (vo2 > 45) return 'Excellent';
  if (vo2 > 38) return 'Good';
  if (vo2 > 30) return 'Fair';
  return 'Poor';
}

const zoneColors = ['#10b981','#3b82f6','#f59e0b','#f97316','#e74c3c'];
const zoneNames  = ['Zone 1 — Warm-Up','Zone 2 — Fat Burn','Zone 3 — Aerobic','Zone 4 — Threshold','Zone 5 — Max'];
const zonePcts   = [[0.5,0.6],[0.6,0.7],[0.7,0.8],[0.8,0.9],[0.9,1.0]];

function calculate() {
  const age      = parseFloat(document.getElementById('age').value);
  const weight   = parseFloat(document.getElementById('weight').value);
  const distance = parseFloat(document.getElementById('distance').value) || 0;
  const time     = parseFloat(document.getElementById('time').value) || 0;
  const reps     = parseFloat(document.getElementById('reps').value) || 0;
  const lift     = parseFloat(document.getElementById('lift').value) || 0;

  if (!age||!weight) { alert('Age and Weight are required'); return; }

  const maxHR   = 220 - age;
  const vo2     = distance&&time ? (distance*1000/time)*0.2+3.5 : 0;
  const oneRM   = reps&&lift ? lift*(1+reps/30) : 0;
  const pace    = distance&&time ? time/distance : 0;
  const calories= distance ? weight*distance*1.036 : 0;

  rd = {age,weight,maxHR,vo2,oneRM,pace,calories,distance,time};

  let html = '';
  if (vo2) {
    html += `<div class="section-label">VO₂ Max</div>
    <div class="result-item highlight"><span class="ri-label">VO₂ Max</span><span class="ri-val">${vo2.toFixed(1)} ml/kg/min &nbsp;<small style="font-size:0.75rem;font-style:normal;">${getVO2Category(vo2)}</small></span></div>`;
  }

  html += `<div class="section-label">Heart Rate Zones (Max HR: ${maxHR} bpm)</div>`;
  zonePcts.forEach((pct,i) => {
    const lo = Math.round(maxHR*pct[0]);
    const hi = Math.round(maxHR*pct[1]);
    html += `<div class="zone-bar"><div class="zone-dot" style="background:${zoneColors[i]}"></div><span class="zone-name">${zoneNames[i]}</span><span class="zone-bpm">${lo}–${hi} bpm</span></div>`;
  });

  if (oneRM) {
    html += `<div class="section-label">Strength</div>
    <div class="result-item"><span class="ri-label">1 Rep Max (Epley)</span><span class="ri-val">${oneRM.toFixed(1)} kg</span></div>`;
  }
  if (pace) {
    html += `<div class="section-label">Running</div>
    <div class="result-item"><span class="ri-label">Pace</span><span class="ri-val">${pace.toFixed(2)} min/km</span></div>
    <div class="result-item"><span class="ri-label">Calories Burned</span><span class="ri-val">${calories.toFixed(0)} kcal</span></div>`;
  }

  document.getElementById('result').innerHTML = html;
}

function downloadPDF() {
  if (!rd.maxHR) { alert('Calculate first!'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFillColor(0,184,148); doc.rect(0,0,210,30,'F');
  doc.setTextColor(255,255,255); doc.setFontSize(18); doc.setFont('helvetica','bold');
  doc.text('Fitness & Performance Report',14,20);
  doc.setFontSize(10); doc.setFont('helvetica','normal');
  doc.text('WebHeal. — Health Calculator',14,28); doc.text(new Date().toLocaleDateString(),160,28);
  doc.setTextColor(15,45,37);
  let y=46;
  const rows = [
    ['Max Heart Rate', rd.maxHR+' bpm'],
    ...(rd.vo2 ? [['VO₂ Max', rd.vo2.toFixed(1)+' ml/kg/min ('+getVO2Category(rd.vo2)+')']] : []),
    ['Zone 1 (Warm-Up)', Math.round(rd.maxHR*0.5)+'–'+Math.round(rd.maxHR*0.6)+' bpm'],
    ['Zone 2 (Fat Burn)', Math.round(rd.maxHR*0.6)+'–'+Math.round(rd.maxHR*0.7)+' bpm'],
    ['Zone 3 (Aerobic)', Math.round(rd.maxHR*0.7)+'–'+Math.round(rd.maxHR*0.8)+' bpm'],
    ['Zone 4 (Threshold)', Math.round(rd.maxHR*0.8)+'–'+Math.round(rd.maxHR*0.9)+' bpm'],
    ['Zone 5 (Max)', Math.round(rd.maxHR*0.9)+'–'+rd.maxHR+' bpm'],
    ...(rd.oneRM ? [['1 Rep Max (Epley)', rd.oneRM.toFixed(1)+' kg']] : []),
    ...(rd.pace  ? [['Running Pace', rd.pace.toFixed(2)+' min/km'],['Calories Burned', rd.calories.toFixed(0)+' kcal']] : []),
  ];
  rows.forEach((row,i)=>{
    if(i%2===0){doc.setFillColor(231,249,244);doc.rect(14,y-6,182,12,'F');}
    doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(61,122,104);
    doc.text(row[0],18,y);
    doc.setFont('helvetica','normal');doc.setTextColor(0,158,126);
    doc.text(row[1],130,y);
    y+=14;
  });
  doc.setFontSize(9);doc.setTextColor(143,191,179);
  doc.text('Generated by WebHeal. · For informational purposes only',14,y+10);
  doc.save('Fitness_Report.pdf');
}
</script>
</body>
</html>
