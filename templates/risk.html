<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Health Risk Indicators — HealApp</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{--brand:#00b894;--brand-dark:#009e7e;--brand-light:#e6f9f4;--brand-mid:#b2ede1;--brand-glow:rgba(0,184,148,0.13);--bg:#f2faf7;--surface:#ffffff;--surface2:#f7fdfb;--border:#d0ede5;--text:#0f2d25;--text-muted:#3d7a68;--text-dim:#8fbfb3;--danger:#e74c3c;--danger-light:#fff0f0;--danger-mid:#ffd6d6;--warn:#f39c12;--warn-light:#fff8e6;--radius:16px;--radius-sm:10px;--shadow:0 2px 16px rgba(0,184,148,0.08);--shadow-md:0 6px 28px rgba(0,184,148,0.13);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Times New Roman',Times,serif;background:var(--bg);color:var(--text);min-height:100vh;}
.topbar{background:var(--brand);height:56px;display:flex;align-items:center;padding:0 28px;box-shadow:0 2px 12px rgba(0,184,148,0.3);position:sticky;top:0;z-index:200;}
.topbar-brand{color:#fff;font-size:1.2rem;font-weight:bold;font-style:italic;}
.topbar-back{margin-left:auto;color:rgba(255,255,255,0.85);font-size:0.82rem;font-weight:bold;text-decoration:none;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);padding:5px 14px;border-radius:20px;}
.hero{background:linear-gradient(135deg,var(--brand) 0%,#00c9a7 100%);padding:38px 24px 78px;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4z'/%3E%3C/g%3E%3C/svg%3E");}
.hero-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.35);color:#fff;border-radius:20px;padding:5px 14px;font-size:0.75rem;font-weight:bold;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;position:relative;}
.hero h1{font-size:clamp(1.6rem,4vw,2.2rem);font-weight:bold;font-style:italic;color:#fff;margin-bottom:8px;position:relative;}
.hero p{font-size:0.9rem;color:rgba(255,255,255,0.85);max-width:460px;margin:0 auto;line-height:1.65;position:relative;}
.page{max-width:860px;margin:0 auto;padding:0 24px 60px;}
.main-wrap{margin-top:-40px;position:relative;z-index:10;display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start;}
.panel{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:26px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.panel::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--brand),#00d4aa);}
.panel-title{font-size:0.78rem;font-weight:bold;text-transform:uppercase;letter-spacing:0.12em;color:var(--brand);margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.panel-title::after{content:'';flex:1;height:1px;background:var(--border);}
.field{margin-bottom:14px;}
.field label{display:block;font-size:0.85rem;font-weight:bold;color:var(--text);margin-bottom:5px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
input[type="number"],select{width:100%;padding:11px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Times New Roman',Times,serif;font-size:0.95rem;color:var(--text);outline:none;transition:border-color 0.2s;appearance:none;}
input:focus,select:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-glow);background:#fff;}
input::placeholder{color:var(--text-dim);}
.sw{position:relative;}
.sw::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--brand);pointer-events:none;}
.optional-label{font-size:0.75rem;color:var(--text-dim);font-weight:normal;margin-left:4px;}
.btn-calc{width:100%;padding:13px;background:var(--brand);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'Times New Roman',serif;font-size:1rem;font-weight:bold;cursor:pointer;box-shadow:0 4px 16px rgba(0,184,148,0.3);margin-top:6px;transition:background 0.2s,transform 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-calc:hover{background:var(--brand-dark);transform:translateY(-1px);}
.btn-pdf{width:100%;padding:11px;background:var(--surface);color:var(--brand);border:1.5px solid var(--brand-mid);border-radius:var(--radius-sm);font-family:'Times New Roman',serif;font-size:0.92rem;font-weight:bold;cursor:pointer;margin-top:10px;transition:all 0.18s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-pdf:hover{background:var(--brand);color:#fff;border-color:var(--brand);}
.result-item{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);margin-bottom:9px;}
.ri-label{font-size:0.85rem;font-weight:bold;color:var(--text-muted);}
.ri-right{display:flex;align-items:center;gap:8px;}
.ri-val{font-size:1rem;font-weight:bold;color:var(--brand);font-style:italic;}
.badge{font-size:0.72rem;font-weight:bold;padding:3px 10px;border-radius:20px;}
.badge-good{background:var(--brand-light);color:var(--brand-dark);border:1px solid var(--brand-mid);}
.badge-warn{background:var(--warn-light);color:var(--warn);border:1px solid #ffe0a0;}
.badge-bad{background:var(--danger-light);color:var(--danger);border:1px solid var(--danger-mid);}
.section-label{font-size:0.72rem;font-weight:bold;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-dim);margin:14px 0 8px;padding-left:4px;}
.empty-result{text-align:center;padding:32px 0;color:var(--text-dim);font-style:italic;font-size:0.9rem;}
.empty-result span{display:block;font-size:2.5rem;margin-bottom:10px;}
@media(max-width:720px){.main-wrap{grid-template-columns:1fr;margin-top:-28px;}.page{padding:0 14px 48px;}.field-row{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-brand">WebHeal.</div>
  <a class="topbar-back" href="{{ url_for('body') }}">← Back To Hub</a>
</div>
<div class="hero">
  <div class="hero-badge">❤️ Health Risk</div>
  <h1>Health Risk Indicators</h1>
  <p>BMI, Obesity Class, Blood Pressure category, Diabetes Risk and ABSI body shape index.</p>
</div>
<div class="page">
  <div class="main-wrap">
    <div class="panel">
      <div class="panel-title">📋 Enter Your Details</div>
      <div class="field-row">
        <div class="field"><label>Height (cm)</label><input type="number" id="height" placeholder="e.g. 170"></div>
        <div class="field"><label>Weight (kg)</label><input type="number" id="weight" placeholder="e.g. 70"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Waist (cm)</label><input type="number" id="waist" placeholder="e.g. 80"></div>
        <div class="field"><label>Age</label><input type="number" id="age" placeholder="e.g. 35"></div>
      </div>
      <div class="field"><label>Gender</label><div class="sw"><select id="gender"><option value="male">Male</option><option value="female">Female</option></select></div></div>
      <div class="field-row">
        <div class="field"><label>Systolic BP <span class="optional-label">optional</span></label><input type="number" id="sys" placeholder="e.g. 120"></div>
        <div class="field"><label>Diastolic BP <span class="optional-label">optional</span></label><input type="number" id="dia" placeholder="e.g. 80"></div>
      </div>
      <button class="btn-calc" onclick="calculate()">⚡ Calculate</button>
      <button class="btn-pdf" onclick="downloadPDF()">⬇ Download PDF Report</button>
    </div>
    <div class="panel">
      <div class="panel-title">📊 Results</div>
      <div id="result"><div class="empty-result"><span>❤️</span>Fill in your details and click Calculate</div></div>
    </div>
  </div>
</div>
<script>
let rd = {};

function calculate() {
  const h      = parseFloat(document.getElementById('height').value);
  const w      = parseFloat(document.getElementById('weight').value);
  const waist  = parseFloat(document.getElementById('waist').value) || 0;
  const age    = parseFloat(document.getElementById('age').value) || 0;
  const gender = document.getElementById('gender').value;
  const sys    = parseFloat(document.getElementById('sys').value) || 0;
  const dia    = parseFloat(document.getElementById('dia').value) || 0;
  if (!h||!w) { alert('Enter Height and Weight'); return; }

  const bmi   = w/((h/100)**2);
  const ideal = gender==='male' ? 50+0.9*(h-152) : 45.5+0.9*(h-152);
  const absi  = waist ? waist/(Math.pow(bmi,2/3)*Math.pow(h/100,0.5)) : 0;

  let obesity='';
  if(bmi<18.5)      obesity='Underweight';
  else if(bmi<23)   obesity='Normal';
  else if(bmi<25)   obesity='Normal (Asian border)';
  else if(bmi<27.5) obesity='Overweight';
  else if(bmi<30)   obesity='Obese I';
  else if(bmi<35)   obesity='Obese II';
  else              obesity='Obese III';

  const obClass = bmi<25?'badge-good':bmi<30?'badge-warn':'badge-bad';

  let bp='',bpClass='';
  if(sys&&dia){
    if(sys<120&&dia<80){bp='Normal';bpClass='badge-good';}
    else if(sys<130&&dia<80){bp='Elevated';bpClass='badge-warn';}
    else if(sys<140||dia<90){bp='High Stage 1';bpClass='badge-warn';}
    else{bp='High Stage 2';bpClass='badge-bad';}
  }

  let diabRisk='',drClass='';
  if(age){
    diabRisk = (age>40&&bmi>25)?'Moderate Risk':(age>45||bmi>30)?'Moderate Risk':'Low Risk';
    drClass  = diabRisk==='Low Risk'?'badge-good':'badge-warn';
  }

  rd = {bmi,ideal,obesity,obClass,bp,bpClass,diabRisk,drClass,absi};

  let html = `
    <div class="section-label">Weight Status</div>
    <div class="result-item"><span class="ri-label">BMI</span><div class="ri-right"><span class="ri-val">${bmi.toFixed(1)}</span><span class="badge ${obClass}">${obesity}</span></div></div>
    <div class="result-item"><span class="ri-label">Ideal Weight</span><span class="ri-val">${ideal.toFixed(1)} kg</span></div>
  `;
  if(bp) html+=`<div class="section-label">Blood Pressure</div><div class="result-item"><span class="ri-label">BP Category</span><div class="ri-right"><span class="ri-val">${sys}/${dia} mmHg</span><span class="badge ${bpClass}">${bp}</span></div></div>`;
  if(diabRisk) html+=`<div class="section-label">Diabetes Risk</div><div class="result-item"><span class="ri-label">Diabetes Risk</span><div class="ri-right"><span class="ri-val">${diabRisk}</span><span class="badge ${drClass}">${diabRisk==='Low Risk'?'Low':'Moderate'}</span></div></div>`;
  if(absi) html+=`<div class="section-label">Body Shape</div><div class="result-item"><span class="ri-label">ABSI Score</span><span class="ri-val">${absi.toFixed(4)}</span></div>`;

  document.getElementById('result').innerHTML = html;
}

function downloadPDF() {
  if (!rd.bmi) { alert('Calculate first!'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFillColor(0,184,148); doc.rect(0,0,210,30,'F');
  doc.setTextColor(255,255,255); doc.setFontSize(18); doc.setFont('helvetica','bold');
  doc.text('Health Risk Report',14,20);
  doc.setFontSize(10); doc.setFont('helvetica','normal');
  doc.text('WebHeal. — Health Calculator',14,28); doc.text(new Date().toLocaleDateString(),160,28);
  let y=46;
  const rows=[
    ['BMI', rd.bmi.toFixed(1)+' — '+rd.obesity],
    ['Ideal Weight', rd.ideal.toFixed(1)+' kg'],
    ...(rd.bp ? [['Blood Pressure', rd.bp]] : []),
    ...(rd.diabRisk ? [['Diabetes Risk', rd.diabRisk]] : []),
    ...(rd.absi ? [['ABSI Score', rd.absi.toFixed(4)]] : []),
  ];
  rows.forEach((row,i)=>{
    if(i%2===0){doc.setFillColor(231,249,244);doc.rect(14,y-6,182,12,'F');}
    doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(61,122,104);
    doc.text(row[0],18,y);
    doc.setFont('helvetica','normal');doc.setTextColor(0,158,126);
    doc.text(row[1],130,y);
    y+=14;
  });
  doc.setFontSize(9);doc.setTextColor(143,191,179);
  doc.text('Generated by WebHeal. · For informational purposes only',14,y+10);
  doc.save('Health_Risk_Report.pdf');
}
</script>
</body>
</html>
